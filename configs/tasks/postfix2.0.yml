
---
- name: Configure Postfix main.cf settings
  community.general.ini_file:
    path: /etc/postfix/main.cf
    section: null
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    no_extra_spaces: true
  loop:
    - { key: smtpd_delay_reject, value: 'yes' }
    - { key: unknown_local_recipient_reject_code, value: '550' }
    - { key: smtpd_reject_unlisted_recipient, value: 'yes' }
    - { key: mynetworks, value: '127.0.0.0/8 [::1]/128' }
    - { key: virtual_mailbox_domains, value: 'hash:/var/spool/postfix/plesk/virtual_domains' }
    - { key: virtual_mailbox_maps, value: 'proxy:hash:/var/spool/postfix/plesk/vmailbox' }
    - { key: local_recipient_maps, value: 'proxy:unix:passwd.byname $alias_maps' }
    - { key: smtpd_relay_restrictions, value: 'permit_mynetworks, permit_sasl_authenticated, reject_unauth_destination' }
    - { key: smtpd_recipient_restrictions, value: 'permit_mynetworks, permit_sasl_authenticated, reject_non_fqdn_recipient, reject_unknown_recipient_domain, reject_unlisted_recipient, reject_unknown_sender_domain, reject_non_fqdn_sender, reject_rbl_client zen.spamhaus.org, reject_rbl_client bl.spamcop.net, reject_rbl_client b.barracudacentral.org, reject_rhsbl_reverse_client dbl.spamhaus.org, reject_rhsbl_sender dbl.spamhaus.org, reject_unauth_destination' }
    - { key: smtpd_client_restrictions, value: 'permit_mynetworks, reject_unknown_client_hostname' }
    - { key: smtpd_helo_required, value: 'yes' }
    - { key: smtpd_helo_restrictions, value: 'reject_invalid_helo_hostname' }
    - { key: smtpd_sender_restrictions, value: 'reject_non_fqdn_sender, reject_unknown_sender_domain' }
    - { key: smtpd_client_message_rate_limit, value: '100' }
    - { key: smtpd_client_connection_rate_limit, value: '30' }
    - { key: smtpd_client_connection_count_limit, value: '10' }
    - { key: header_checks, value: 'regexp:/etc/postfix/header_checks' }
  notify: restart postfix

- name: Install header_checks
  copy:
    dest: /etc/postfix/header_checks
    content: |
      /Subject:.*FedEx.*delay/ REJECT phishing attempt
    owner: root
    group: root
    mode: '0644'
  notify: restart postfix

- name: Check Plesk event handlers
  command: plesk bin event_handler -l
  register: plesk_handlers
  changed_when: false

- name: Create Plesk event handler
  command: >-
    plesk bin event_handler --create
    -event mail_management_status_update
    -priority 100
    -user root
    -command "/usr/local/bin/fix-postfix.sh"
  when: "'/usr/local/bin/fix-postfix.sh' not in plesk_handlers.stdout"
